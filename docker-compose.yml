services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: watchdog_mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./src/broker/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "health", "-m", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: watchdog_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: watchdog_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

  watchdog:
    build: .
    container_name: watchdog_service
    command: python3 -u src/watchdog/watchdog.py
    environment:
      PYTHONUNBUFFERED: "1"
      POSTGRES_HOST: postgres
      MQTT_HOST: mosquitto
      REDIS_HOST: redis
    env_file: .env
    depends_on:
      mosquitto:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import sys; sys.exit(0)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  simulator:
    build: .
    container_name: watchdog_simulator
    command: python3 -u src/simulator/device_simulator.py
    environment:
      PYTHONUNBUFFERED: "1"
      MQTT_HOST: mosquitto
    env_file: .env
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import sys; sys.exit(0)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  mosquitto_data:
  mosquitto_log:
  postgres_data:
